name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: html2image

      - name: Build Mac dmg
        run: npx electron-builder --mac dmg --publish never
        working-directory: html2image

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: html2image/dist/*.dmg
          body: |
            ## HTML to Image ${{ github.ref_name }}

            **Mac**: `.dmg` 다운로드 → 열어서 Applications에 드래그 → 완료

            **Windows**: `.exe` 다운로드 → 더블클릭 설치
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: html2image

      - name: Build Windows exe
        run: npx electron-builder --win nsis --publish never
        working-directory: html2image

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: html2image/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
