<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>HTML to Image</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --border: #2a2a4a;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --accent-light: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .titlebar .icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .titlebar h1 { font-size: 15px; font-weight: 600; }
    .main { display: flex; flex: 1; overflow: hidden; }

    /* 왼쪽 에디터 */
    .panel-left {
      display: flex; flex-direction: column;
      width: 50%; border-right: 1px solid var(--border);
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted);
    }
    .btn {
      padding: 5px 12px; border-radius: 6px; font-size: 12px;
      font-weight: 500; cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted);
      transition: all 0.15s;
    }
    .btn:hover { background: var(--border); color: var(--text); }
    .btn-group { display: flex; gap: 6px; }
    #html-editor {
      flex: 1; resize: none; border: none; outline: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px; line-height: 1.7;
      background: var(--bg); color: #c9d1d9;
      tab-size: 2; caret-color: var(--accent-light);
    }

    /* 오른쪽 */
    .panel-right { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .settings-bar {
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .setting-item { display: flex; align-items: center; gap: 6px; }
    .setting-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .setting-item input[type="number"] {
      width: 70px; padding: 4px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 12px; outline: none;
    }
    .setting-item input[type="number"]:focus { border-color: var(--accent); }
    .setting-item select {
      padding: 4px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 12px;
      outline: none; cursor: pointer;
    }

    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface2); flex-shrink: 0;
    }
    .tab {
      padding: 9px 18px; font-size: 12px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }
    .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    .preview-wrapper {
      flex: 1; overflow: auto;
      background: repeating-conic-gradient(#1e1e2e 0% 25%, #181828 0% 50%) 0 0 / 20px 20px;
      display: flex; align-items: flex-start; justify-content: center; padding: 20px;
    }
    #preview-frame {
      border: none; display: block;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--text-muted);
      padding: 60px; text-align: center; width: 100%;
    }
    .placeholder .icon-big { font-size: 48px; opacity: 0.3; }
    .placeholder p { font-size: 14px; }

    .action-bar {
      padding: 12px 16px; background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .btn-capture {
      padding: 8px 20px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      color: #fff; transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-capture:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-save {
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      transition: all 0.15s;
    }
    .btn-save:hover { background: var(--border); }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      margin-left: auto; font-size: 12px; padding: 5px 12px;
      border-radius: 6px; display: none;
    }
    .status.show { display: block; }
    .status.success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .status.error { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .status.loading { background: rgba(124,58,237,0.15); color: var(--accent-light); border: 1px solid rgba(124,58,237,0.3); }

    #result-img { max-width: 100%; display: none; box-shadow: 0 8px 40px rgba(0,0,0,0.6); border-radius: 4px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="titlebar">
  <div class="icon">🖼</div>
  <h1>HTML to Image</h1>
</div>

<div class="main">
  <div class="panel-left">
    <div class="panel-header">
      <span class="panel-label">HTML 코드</span>
      <div class="btn-group">
        <button class="btn" id="btn-sample">예제</button>
        <button class="btn" id="btn-clear">지우기</button>
      </div>
    </div>
    <textarea id="html-editor" spellcheck="false" placeholder="여기에 HTML 코드를 입력하세요..."></textarea>
  </div>

  <div class="panel-right">
    <div class="settings-bar">
      <div class="setting-item">
        <span class="setting-label">너비</span>
        <input type="number" id="width-input" value="1200" min="100" max="5000" step="10" />
        <span class="setting-label">px</span>
      </div>
      <div class="setting-item">
        <span class="setting-label">높이</span>
        <input type="number" id="height-input" value="630" min="100" max="5000" step="10" />
        <span class="setting-label">px</span>
      </div>
      <div class="setting-item">
        <span class="setting-label">포맷</span>
        <select id="format-select">
          <option value="png">PNG</option>
          <option value="jpeg">JPG</option>
        </select>
      </div>
      <div class="setting-item">
        <span class="setting-label">프리셋</span>
        <select id="preset-select">
          <option value="">직접 입력</option>
          <option value="1200,630">OG 이미지 (1200×630)</option>
          <option value="1080,1080">인스타그램 (1080×1080)</option>
          <option value="1920,1080">Full HD (1920×1080)</option>
          <option value="1280,720">HD (1280×720)</option>
          <option value="800,600">800×600</option>
          <option value="375,812">모바일 (375×812)</option>
        </select>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="preview">미리보기</div>
      <div class="tab" data-tab="result">캡처 결과</div>
    </div>

    <div class="tab-content active" id="tab-preview">
      <div class="preview-wrapper" id="preview-wrapper">
        <div class="placeholder" id="preview-placeholder">
          <div class="icon-big">📄</div>
          <p>왼쪽에 HTML을 입력하고<br><strong>미리보기</strong>를 누르세요<br><small style="opacity:0.6">Ctrl+Enter</small></p>
        </div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" style="display:none"></iframe>
      </div>
    </div>

    <div class="tab-content" id="tab-result">
      <div class="preview-wrapper">
        <div class="placeholder" id="result-placeholder">
          <div class="icon-big">🎨</div>
          <p>캡처 버튼을 눌러<br>이미지를 생성하세요</p>
        </div>
        <img id="result-img" />
      </div>
    </div>

    <div class="action-bar">
      <button class="btn" id="btn-preview">👁 미리보기</button>
      <button class="btn-capture" id="btn-capture">📸 이미지 캡처</button>
      <button class="btn-save" id="btn-save" disabled>💾 저장</button>
      <div class="status" id="status"></div>
    </div>
  </div>
</div>

<script>
  const editor = document.getElementById('html-editor');
  const previewFrame = document.getElementById('preview-frame');
  const previewPlaceholder = document.getElementById('preview-placeholder');
  const widthInput = document.getElementById('width-input');
  const heightInput = document.getElementById('height-input');
  const formatSelect = document.getElementById('format-select');
  const presetSelect = document.getElementById('preset-select');
  const btnCapture = document.getElementById('btn-capture');
  const btnSave = document.getElementById('btn-save');
  const btnPreview = document.getElementById('btn-preview');
  const resultImg = document.getElementById('result-img');
  const resultPlaceholder = document.getElementById('result-placeholder');
  const statusEl = document.getElementById('status');

  let capturedDataUrl = null;

  // 탭
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // 프리셋
  presetSelect.addEventListener('change', () => {
    const val = presetSelect.value;
    if (!val) return;
    const [w, h] = val.split(',');
    widthInput.value = w;
    heightInput.value = h;
  });

  // Tab 키
  editor.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
    if (e.ctrlKey && e.key === 'Enter') updatePreview();
  });

  // 미리보기
  function updatePreview() {
    const html = editor.value.trim();
    if (!html) return;

    const w = parseInt(widthInput.value) || 1200;
    const h = parseInt(heightInput.value) || 630;
    const wrapper = document.getElementById('preview-wrapper');
    const maxW = wrapper.clientWidth - 40;
    const scale = Math.min(1, maxW / w);

    previewPlaceholder.style.display = 'none';
    previewFrame.style.display = 'block';
    previewFrame.style.width = w + 'px';
    previewFrame.style.height = h + 'px';
    previewFrame.style.transform = `scale(${scale})`;
    previewFrame.style.transformOrigin = 'top left';
    wrapper.style.minHeight = (h * scale + 40) + 'px';

    const blob = new Blob([html], { type: 'text/html' });
    previewFrame.src = URL.createObjectURL(blob);

    switchTab('preview');
  }

  btnPreview.addEventListener('click', updatePreview);

  // 캡처 - iframe srcdoc를 숨겨진 iframe에 렌더링 후 html2canvas
  btnCapture.addEventListener('click', async () => {
    const html = editor.value.trim();
    if (!html) return;

    const w = parseInt(widthInput.value) || 1200;
    const h = parseInt(heightInput.value) || 630;
    const format = formatSelect.value;

    showStatus('캡처 중...', 'loading');
    btnCapture.disabled = true;

    try {
      // 숨겨진 iframe으로 렌더링
      const iframe = document.createElement('iframe');
      iframe.style.cssText = `position:fixed;left:-9999px;top:-9999px;width:${w}px;height:${h}px;border:none;`;
      iframe.sandbox = 'allow-scripts allow-same-origin';
      document.body.appendChild(iframe);

      await new Promise(resolve => {
        iframe.onload = resolve;
        const blob = new Blob([html], { type: 'text/html' });
        iframe.src = URL.createObjectURL(blob);
      });

      // 렌더링 대기
      await new Promise(r => setTimeout(r, 600));

      const canvas = await html2canvas(iframe.contentDocument.body, {
        width: w,
        height: h,
        scale: 1,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        windowWidth: w,
        windowHeight: h,
      });

      document.body.removeChild(iframe);

      capturedDataUrl = canvas.toDataURL('image/' + format, format === 'jpeg' ? 0.95 : undefined);
      resultImg.src = capturedDataUrl;
      resultImg.style.display = 'block';
      resultPlaceholder.style.display = 'none';
      btnSave.disabled = false;

      switchTab('result');
      showStatus('완료!', 'success');
    } catch (err) {
      showStatus('실패: ' + err.message, 'error');
    } finally {
      btnCapture.disabled = false;
    }
  });

  // 저장
  btnSave.addEventListener('click', () => {
    if (!capturedDataUrl) return;
    const ext = formatSelect.value === 'jpeg' ? 'jpg' : 'png';
    const a = document.createElement('a');
    a.href = capturedDataUrl;
    a.download = `html-image-${Date.now()}.${ext}`;
    a.click();
  });

  // 예제
  document.getElementById('btn-sample').addEventListener('click', () => {
    editor.value = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    width: 1200px; height: 630px;
    display: flex; align-items: center; justify-content: center;
    color: white;
  }
  .card { text-align: center; padding: 60px; }
  h1 {
    font-size: 64px; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
  }
  p { font-size: 24px; color: #94a3b8; line-height: 1.6; }
  .tag {
    display: inline-block; margin-top: 30px;
    padding: 8px 20px;
    background: rgba(124,58,237,0.3);
    border: 1px solid rgba(124,58,237,0.5);
    border-radius: 20px; font-size: 14px; color: #a78bfa;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>HTML to Image</h1>
    <p>HTML 코드를 이미지로 변환하세요</p>
    <span class="tag">✨ 웹 버전</span>
  </div>
</body>
</html>`;
    updatePreview();
  });

  // 지우기
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (editor.value && confirm('코드를 지우시겠습니까?')) {
      editor.value = '';
      previewFrame.style.display = 'none';
      previewPlaceholder.style.display = 'flex';
    }
  });

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
  }

  let statusTimer;
  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status show ' + type;
    clearTimeout(statusTimer);
    if (type !== 'loading') statusTimer = setTimeout(() => statusEl.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
